<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Маршрут на день</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f1115, #1b1e29);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { margin: 20px 0; font-size: 28px; color: #4da3ff; text-shadow: 0 0 8px #4da3ff55; }
    .lang-switch { margin-bottom: 20px; }
    input {
      padding: 10px;
      margin: 5px;
      width: 45%; /* половина ширини */
      border-radius: 10px;
      border: 1px solid #333;
      background: #1c1f2b;
      color: #fff;
      font-size: 15px;
      transition: 0.2s;
    }
    input:focus { outline: none; border-color: #4da3ff; box-shadow: 0 0 6px #4da3ff88; }
    button {
      padding: 10px 16px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px #00000066; }
    .primary { background: #4da3ff; color: #000; }
    .ok { background: #27c26a; color: #000; }
    .danger { background: #ff5c5c; color: #000; }
    .list { margin: 20px auto; max-width: 500px; text-align: left; }
    .stop {
      padding: 12px;
      background: #22263a;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #333;
      font-size: 16px;
      transition: 0.2s;
    }
    .stop:hover { background: #2c3147; border-color: #4da3ff; }
    h2#status { margin-top: 20px; font-size: 20px; color: #ffd166; text-shadow: 0 0 6px #000; }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button class="primary" onclick="setLang('uk')">🇺🇦 Українська</button>
    <button class="primary" onclick="setLang('it')">🇮🇹 Italiano</button>
  </div>

  <h1 id="title">Маршрут на день 🚛</h1>

  <input id="label" placeholder="Назва (наприклад: Магазин Fiat)">
  <input id="addr" placeholder="Адреса (наприклад: Parma, Via Roma)">
  <br>
  <button class="primary" id="addBtn">Додати</button>

  <div class="list" id="list"></div>

  <button class="ok" id="startBtn">Старт</button>
  <button class="ok" id="nextBtn" disabled>Завершити → Наступна</button>
  <button class="danger" id="resetBtn">Новий маршрут</button>

  <h2 id="status"></h2>

<script>
  let stops = [];
  let idx = -1;
  let lang = "uk";

  const texts = {
    uk: {
      title: "Маршрут на день 🚛",
      add: "Додати",
      start: "Старт",
      next: "Завершити → Наступна",
      reset: "Новий маршрут",
      noStops: "Немає зупинок",
      finished: "Маршрут завершено ✅",
      stop: "Виконується зупинка №"
    },
    it: {
      title: "Percorso della giornata 🚛",
      add: "Aggiungi",
      start: "Avvia",
      next: "Fine → Successiva",
      reset: "Nuovo percorso",
      noStops: "Nessuna fermata",
      finished: "Percorso completato ✅",
      stop: "Tappa in corso №"
    }
  };

  function setLang(l) {
    lang = l;
    document.getElementById("title").textContent = texts[lang].title;
    document.getElementById("addBtn").textContent = texts[lang].add;
    document.getElementById("startBtn").textContent = texts[lang].start;
    document.getElementById("nextBtn").textContent = texts[lang].next;
    document.getElementById("resetBtn").textContent = texts[lang].reset;
    render();
  }

  document.getElementById("addBtn").onclick = () => {
    const label = document.getElementById("label").value.trim();
    const addr = document.getElementById("addr").value.trim();
    if (!addr) return alert("Введи адресу");
    stops.push({label, addr});
    document.getElementById("label").value = "";
    document.getElementById("addr").value = "";
    render();
  };

  document.getElementById("startBtn").onclick = () => {
    if (stops.length === 0) return alert(texts[lang].noStops);
    idx = 0;
    openMaps(stops[idx].addr);
    document.getElementById("status").textContent = texts[lang].stop + (idx+1);
    document.getElementById("nextBtn").disabled = false;
  };

  document.getElementById("nextBtn").onclick = () => {
    idx++;
    if (idx >= stops.length) {
      document.getElementById("status").textContent = texts[lang].finished;
      document.getElementById("nextBtn").disabled = true;
      return;
    }
    openMaps(stops[idx].addr);
    document.getElementById("status").textContent = texts[lang].stop + (idx+1);
  };

  document.getElementById("resetBtn").onclick = () => {
    if (!confirm("Очистити?")) return;
    stops = [];
    idx = -1;
    document.getElementById("status").textContent = "";
    render();
    document.getElementById("nextBtn").disabled = true;
  };

  function openMaps(addr) {
    const url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(addr);
    window.open(url, "_blank");
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    stops.forEach((s, i) => {
      const div = document.createElement("div");
      div.className = "stop";
      div.textContent = (i+1) + ". " + (s.label ? s.label + " — " : "") + s.addr;
      list.appendChild(div);
    });
  }

  setLang("uk");
</script>
</body>
</html>
